<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="rusticInk" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"
        result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="0.6" result="blurred" />
      <feComponentTransfer in="blurred">
        <feFuncA type="linear" slope="15" intercept="-5" />
      </feComponentTransfer>
    </filter>
  </defs>

  <g filter="url(#rusticInk)">
    <circle cx="100" cy="100" r="90" fill="#F7F3EB" stroke="#DED6C4" stroke-width="1" />
  </g>

  <g filter="url(#rusticInk)">
    <g stroke="#2C221A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 60,50 C 85,55 90,110 60,120" />
      <path d="M 140,50 C 115,55 110,110 140,120" />
      <path d="M 101,30 C 103,70 98,110 99,140" />
      <path d="M 75,88 C 90,85 110,87 125,84" />
      <circle cx="99" cy="148" r="7" />
    </g>

    <g stroke="#2C221A" stroke-width="2" opacity="0.6" fill="none" stroke-linecap="round">
      <path d="M 59,51 C 83,56 88,109 59,121" />
      <path d="M 141,51 C 117,56 112,109 141,121" />
      <path d="M 100,31 C 104,69 97,111 98.5,139" />
    </g>
  </g>
</svg>
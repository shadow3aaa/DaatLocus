[package]
name = "spinova"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
chrono = "0.4.44"
crossterm = "0.29.0"
miette = { version = "7.6.0", features = ["fancy"] }
ndarray = "0.17.2"
ort = { version = "2.0.0-rc.12", features = ["ndarray"] }
parking_lot = "0.12.5"
portable-pty = "0.9.0"
postcard = { version = "1.1.3", features = ["alloc"] }
ratatui = "0.30.0"
reqwest = { version = "0.13.2", features = ["json"] }
schemars = "1.2.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_path_to_error = "0.1.20"
sha2 = "0.10.9"
sysinfo = "0.38.4"
thiserror = "2.0.18"
tokenizers = { version = "0.22.2", default-features = false, features = [
    "progressbar",
    "onig",
] }
tokio = { version = "1.50.0", features = ["full"] }
toml = "1.0.6"
tui-term = "0.3.2"
uuid = { version = "1.22.0", features = ["serde", "v4"] }
vt100 = "0.16.2"
